name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build_type: Release
          - os: ubuntu-24.04
            build_type: Debug
          - os: macos-15
            build_type: Release

    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: ${{ matrix.os == 'ubuntu-24.04' && 'postgres:15' || '' }}
        env:
          POSTGRES_USER: runner
          POSTGRES_DB: cortex_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: cortex_test
      PGUSER: runner

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config \
            libpq-dev libspdlog-dev libsimdjson-dev \
            libcurl4-openssl-dev libssl-dev \
            libhiredis-dev libgtest-dev \
            libgrpc++-dev libprotobuf-dev protobuf-compiler \
            protobuf-compiler-grpc \
            redis-server

      - name: Build libpqxx from source (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Ubuntu 24.04's libpqxx 7.8.1 package was compiled with C++17,
          # but our C++20 build triggers source_location-bearing exception
          # constructors that don't exist in the C++17 binary (ABI mismatch).
          # Build from source with C++20 to get matching symbols.
          curl -sL https://github.com/jtv/libpqxx/archive/refs/tags/7.9.2.tar.gz | tar xz
          cmake -B pqxx-build -S libpqxx-7.9.2 \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_BUILD_TYPE=Release \
            -DSKIP_BUILD_TEST=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build pqxx-build -j$(nproc)
          sudo cmake --install pqxx-build
          sudo ldconfig

      - name: Install ONNX Runtime (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          ORT_VERSION=1.22.0
          curl -sL https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz | \
            sudo tar xz -C /usr/local --strip-components=1
          # Create the include subdirectory that pkg-config expects
          sudo mkdir -p /usr/local/include/onnxruntime
          sudo ln -sf /usr/local/include/onnxruntime_c_api.h /usr/local/include/onnxruntime/
          sudo ln -sf /usr/local/include/onnxruntime_cxx_api.h /usr/local/include/onnxruntime/
          sudo ln -sf /usr/local/include/onnxruntime_cxx_inline.h /usr/local/include/onnxruntime/
          sudo ln -sf /usr/local/include/onnxruntime_float16.h /usr/local/include/onnxruntime/
          sudo ln -sf /usr/local/include/onnxruntime_run_options_config_keys.h /usr/local/include/onnxruntime/
          sudo ln -sf /usr/local/include/onnxruntime_session_options_config_keys.h /usr/local/include/onnxruntime/
          sudo ldconfig

      - name: Install llhttp (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          curl -sL https://github.com/nodejs/llhttp/archive/refs/tags/release/v9.2.1.tar.gz | tar xz
          cmake -B llhttp-build -S llhttp-release-v9.2.1 -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=ON
          cmake --build llhttp-build -j$(nproc)
          sudo cmake --install llhttp-build
          sudo ldconfig

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config \
            libpqxx spdlog simdjson curl openssl \
            hiredis googletest onnxruntime llhttp \
            grpc protobuf abseil \
            postgresql@15 redis

      - name: Start services (macOS)
        if: runner.os == 'macOS'
        run: |
          brew services start postgresql@15
          brew services start redis
          sleep 3
          /opt/homebrew/opt/postgresql@15/bin/createdb -p 5432 cortex_test || true

      - name: Start Redis (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo systemctl start redis-server || redis-server --daemonize yes

      - name: Apply database schema
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            /opt/homebrew/opt/postgresql@15/bin/psql -p 5432 -d cortex_test -f sql/schema.sql -q
          else
            psql -d cortex_test -f sql/schema.sql -q
          fi

      - name: Configure CMake
        run: |
          # On macOS, gRPC/protobuf/abseil are found via CMake CONFIG packages
          # under the Homebrew prefix, which CMake does not search by default.
          PREFIX_ARG=""
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            PREFIX_ARG="-DCMAKE_PREFIX_PATH=$(brew --prefix)"
          fi
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            $PREFIX_ARG

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Run unit tests
        run: cd build && ctest --output-on-failure --timeout 60

      - name: Run integration tests
        env:
          CORTEX_TEST_DB: "host=localhost port=5432 dbname=cortex_test"
          CORTEX_RUN_INTEGRATION_TESTS: "1"
        run: |
          if [[ -f build/cortex_integration_tests ]]; then
            ./build/cortex_integration_tests
          else
            echo "Integration test binary not found — skipping"
          fi
