# CORTEX runtime configuration
# Copy this file and adjust for your environment.

[database]
host     = "localhost"
port     = 5433
dbname   = "cortex"
user     = ""          # empty = use $USER

[redis]
url      = "redis://localhost:6379"
ttl_secs = 60

[etl]
threads        = 4
request_delay_ms = 150   # per-thread delay between S3 requests

[server]
host = "0.0.0.0"
port = 8080
