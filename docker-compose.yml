# docker compose up        — start everything
# docker compose up -d    — start in background
# docker compose down -v  — stop and remove volumes

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortex
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cortex:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: "redis://redis:6379"
    command:
      - "--port"
      - "8080"
      - "--db"
      - "host=db port=5432 dbname=cortex user=cortex password=cortex"
      - "--www"
      - "./www"

volumes:
  pgdata:
